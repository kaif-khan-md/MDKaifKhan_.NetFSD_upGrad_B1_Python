<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — E-Learning</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<header class="modern-header d-flex justify-content-between align-items-center px-4 py-3">
    
    <div>
        <h5 id="pageTitle" class="mb-0 fw-semibold">Dashboard</h5>
        <small id="pageSubtitle" class="text-muted">Welcome back</small>
    </div>

    <div class="text-muted small">
        E-Learning Platform
    </div>

</header>

<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- LEFT: Brand -->
        <span class="navbar-brand fw-bold">E-Learning</span>

        <!-- CENTER: Links -->
        <div class="d-flex gap-3 align-items-center">
            <a class="nav-link text-white nav-item-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link text-white nav-item-link" href="courses.html">Courses</a>
            <a class="nav-link text-white nav-item-link" href="quiz.html">Quiz</a>
            <a class="nav-link text-white nav-item-link" href="profile.html">Profile</a>
            <a id="adminLink" class="nav-link text-warning fw-bold nav-item-link" href="admin.html" style="display:none;">
                Admin
            </a>
        </div>

        <!-- RIGHT: Logout -->
         <div>
            <button onclick="logout()" class="btn btn-outline-light btn-sm px-3">
                Logout
            </button>
        </div>

    </div>
</nav>

<main class="container mt-4">

    <!-- COURSES -->
    <section class="card p-4 mb-4">
        <h4>Create Course</h4>
        <input id="courseTitle" class="form-control mb-2" placeholder="Title">
        <textarea id="courseDesc" class="form-control mb-2" placeholder="Description"></textarea>
        <button onclick="createCourseAdmin()" class="btn btn-success">Create</button>
    </section>

    <section class="card p-4 mb-4">
        <h4>Manage Courses</h4>
        <div id="adminCourses"></div>
    </section>

    <!-- RESULTS -->
    <section class="card p-4">
        <h4>All User Results</h4>
        <div id="allResults"></div>
    </section>

</main>

<script src="../js/api.js"></script>
<script src="../js/index.js"></script>
<script src="../js/admin.js"></script>

</body>
</html>
