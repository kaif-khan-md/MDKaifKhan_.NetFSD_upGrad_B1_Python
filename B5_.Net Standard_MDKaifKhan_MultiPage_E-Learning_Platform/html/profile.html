<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — E-Learning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<header class="modern-header d-flex justify-content-between align-items-center px-4 py-3">
    
    <div>
        <h5 id="pageTitle" class="mb-0 fw-semibold">Dashboard</h5>
        <small id="pageSubtitle" class="text-muted">Welcome back</small>
    </div>

    <div class="text-muted small">
        E-Learning Platform
    </div>

</header>

<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between align-items-center">

        <!-- LEFT: Brand -->
        <span class="navbar-brand fw-bold">E-Learning</span>

        <!-- CENTER: Links -->
        <div class="d-flex gap-3 align-items-center">
            <a class="nav-link text-white nav-item-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link text-white nav-item-link" href="courses.html">Courses</a>
            <a class="nav-link text-white nav-item-link" href="quiz.html">Quiz</a>
            <a class="nav-link text-white nav-item-link" href="profile.html">Profile</a>
            <a id="adminLink" class="nav-link text-warning fw-bold nav-item-link" href="admin.html" style="display:none;">
                Admin
            </a>
        </div>

        <!-- RIGHT: Logout -->
        <div>
            <button onclick="logout()" class="btn btn-outline-light btn-sm px-3">
                Logout
            </button>
        </div>

    </div>
</nav>
<div class="container mt-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="dashboard.html">Home</a></li>
            <li class="breadcrumb-item active">Profile</li>
        </ol>
    </nav>
</div>

<main class="container mt-4">

    <!-- User info card -->
    <section class="card shadow p-4 mb-4">
        <h4 class="mb-3">👤 User Profile</h4>

        <div class="mb-3">
            <p class="mb-1"><strong>Name:</strong> <span id="displayName" class="badge bg-success fs-6"></span></p>
            <p class="mb-1"><strong>Email:</strong> <span id="displayEmail" class="text-muted"></span></p>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-md-6">
                <input type="text"  id="usernameInput" class="form-control" placeholder="New name">
            </div>
            <div class="col-md-6">
                <input type="email" id="emailInput"    class="form-control" placeholder="New email (optional)">
            </div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-success" onclick="handleName()">💾 Save Changes</button>
            <button class="btn btn-outline-danger" onclick="deleteAccount()">🗑 Delete Account</button>
        </div>
    </section>

    <!-- Completed courses -->
    <section class="card shadow p-4 mb-4">
        <h5 class="mb-3"  id="completedTitle">📚 Completed Courses</h5>
        <ul id="completedList" class="list-group"></ul>
    </section>

    <!-- Quiz results -->
    <section class="card shadow p-4 mb-4">
        <h5 class="mb-3">📊 Quiz Results</h5>
        <p id="quizScore" class="fw-bold mb-3"></p>
        <ul id="resultsHistory" class="list-group"></ul>
    </section>

    <!-- Analytics -->
    <!-- <section class="card shadow p-4 mb-4">
        <div id="analyticsSection"></div>
    </section> -->

</main>

<footer class="bg-dark text-white text-center p-2 mt-4">
    <p class="mb-0">© 2026 E-learning Platform</p>
</footer>

<script src="../js/api.js"></script>
<script src="../js/profile.js"></script>
<script src="../js/index.js"></script>
</body>
</html>
